name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install release tooling
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check llmock tests examples/retry_with_openai.py

      - name: Test
        run: pytest -q

      - name: Build distributions
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    environment:
      name: pypi
      url: https://pypi.org/project/llmock/
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish package to PyPI with Trusted Publishing
        if: ${{ env.PYPI_API_TOKEN == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip_existing: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}

      - name: Publish package to PyPI with token fallback
        if: ${{ env.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          attestations: false
          skip_existing: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}

  github-release:
    name: Create GitHub release
    needs: publish-pypi
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
